<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MFC KIM Dashboard</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✝</text></svg>">
</head>
<body class="admin-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div style="font-size: 40px; color: var(--admin-gold); margin-bottom: 8px;">✝</div>
                <h1>MFC KIM Admin</h1>
                <p>Sanctuary Management Dashboard</p>
            </div>
            <form id="login-form">
                <div style="margin-bottom: 16px; text-align: left;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--admin-sidebar);">Admin Email</label>
                    <input type="email" id="admin-email" placeholder="admin@mfckim.org" required style="width: 100%; padding: 12px; border: 1px solid var(--admin-border); border-radius: 8px; font-size: 15px;">
                </div>
                <div style="margin-bottom: 24px; text-align: left;">
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--admin-sidebar);">Password</label>
                    <div class="password-field-wrapper" style="position: relative;">
                        <input type="password" id="admin-password" name="password" required placeholder="••••••••" style="width: 100%; padding: 12px 40px 12px 12px; border: 1px solid var(--admin-border); border-radius: 8px; font-size: 15px;">
                        <button type="button" id="toggle-password" aria-label="Show password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; color: var(--admin-gold); outline: none;">
                            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn">🔐 Sign In to Dashboard</button>
            </form>
            <div id="demo-login-box" style="margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--admin-border);">
                <p style="font-size: 12px; color: var(--admin-muted); margin-bottom: 10px;">Testing or previewing without Firebase Auth?</p>
                <button type="button" id="demo-login-btn" class="login-btn" style="background: var(--admin-gold); color: #fff; margin-top: 0;">⚡ Enter Demo Admin Mode</button>
            </div>
            <div id="login-error" style="margin-top: 16px; padding: 12px; background: #ffebee; color: #c62828; border-radius: 6px; font-size: 14px; display: none;"></div>
            <div style="margin-top: 30px;">
                <a href="../index.html" style="font-size: 14px; color: var(--admin-muted); text-decoration: none;">← Return to Sanctuary Public Site</a>
            </div>
        </div>
    </div>

    <!-- Password toggle: plain script, independent of the Firebase module below,
         so it always works even if Firebase fails to load -->
    <script>
      document.getElementById('toggle-password').addEventListener('click', function () {
        const input = document.getElementById('admin-password');
        const icon = document.getElementById('eye-icon');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        icon.innerHTML = isHidden
          ? '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      });
    </script>

    <script type="module" src="../js/admin/login.js?v=4"></script>
</body>
</html>
